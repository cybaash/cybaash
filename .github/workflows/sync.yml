##############################################################################
#  sync.yml — Power-Sync v2: split-file data + verify + deploy
#
#  data.json is now split into 5 smaller files for performance:
#    portfolio/data_main.json        (~47 KB)  — about/contact/skills/experience/projects/flags
#    portfolio/data_creds_1.json     (~1.5 MB) — credentials batch 1
#    portfolio/data_creds_2.json     (~3.3 MB) — credentials batch 2
#    portfolio/data_creds_3.json     (~3.3 MB) — credentials batch 3
#    portfolio/data_creds_4.json     (~3.2 MB) — credentials batch 4
#
#  What this workflow does:
#  1. Verifies all 5 split JSON files are valid
#  2. Copies all split files into the assembled _site at correct paths
#  3. Mirrors all split files into admin/public/ so Vite bundles them
#  4. Builds the admin React app with Vite
#  5. Deploys the final _site to GitHub Pages
#
#  Trigger: every push to `main`, or manually via Actions → Run workflow
##############################################################################

name: Power-Sync ▸ Verify, Mirror & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:            pages
  cancel-in-progress: false

env:
  DATA_MAIN:    portfolio/data_main.json
  DATA_CREDS_1: portfolio/data_creds_1.json
  DATA_CREDS_2: portfolio/data_creds_2.json
  DATA_CREDS_3: portfolio/data_creds_3.json
  DATA_CREDS_4: portfolio/data_creds_4.json
  NODE_VERSION:   "20"
  PYTHON_VERSION: "3.12"

jobs:

  # ── Job 1: verify all split JSON files ─────────────────────────────────────
  verify:
    name: "① Verify split data files"
    runs-on: ubuntu-latest
    outputs:
      total_creds: ${{ steps.stats.outputs.total_creds }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate all split JSON files
        id: verify_step
        run: |
          python3 - << 'EOF'
          import json, sys, os

          FILES = [
            'portfolio/data_main.json',
            'portfolio/data_creds_1.json',
            'portfolio/data_creds_2.json',
            'portfolio/data_creds_3.json',
            'portfolio/data_creds_4.json',
          ]
          MAIN_KEYS = {'about','contact','experience','skills','projects','flags'}

          total_creds = 0
          for f in FILES:
            if not os.path.exists(f):
              print(f'❌ MISSING: {f}')
              sys.exit(1)
            with open(f, 'rb') as fh:
              try:
                data = json.loads(fh.read())
              except json.JSONDecodeError as e:
                print(f'❌ INVALID JSON in {f}: {e}')
                sys.exit(1)
            if f == 'portfolio/data_main.json':
              missing = MAIN_KEYS - set(data.keys())
              if missing:
                print(f'❌ data_main.json missing keys: {missing}')
                sys.exit(1)
            elif 'credentials' in f:
              creds = data.get('credentials', [])
              if not isinstance(creds, list):
                print(f'❌ {f}: "credentials" must be a list')
                sys.exit(1)
              total_creds += len(creds)
            size_kb = os.path.getsize(f) / 1024
            print(f'✅ {f}  ({size_kb:.1f} KB)')

          print(f'\n✅ Total credentials across all files: {total_creds}')
          # Write output for downstream jobs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
            out.write(f'total_creds={total_creds}\n')
          EOF

      - name: Print file stats summary
        id: stats
        run: |
          echo "### ✅ Split data files verified" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json; do
            SIZE=$(stat -c%s "$f")
            echo "| \`$f\` | ${SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          done
          # Pass total_creds from verify_step output
          echo "total_creds=${{ steps.verify_step.outputs.total_creds || 0 }}" >> "$GITHUB_OUTPUT"

  # ── Job 2: build + assemble site ───────────────────────────────────────────
  build:
    name: "② Build & assemble _site"
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('admin/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # Mirror all 5 split files into admin/public/ so Vite bundles them
      - name: Mirror split data files → admin/public/
        run: |
          mkdir -p admin/public
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json; do
            DEST="admin/public/$(basename $f)"
            ln "$f" "$DEST" 2>/dev/null || cp "$f" "$DEST"
            echo "Mirrored $(stat -c%s $DEST) bytes → $DEST"
          done

      - name: Install admin dependencies
        working-directory: admin
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build admin panel (Vite)
        working-directory: admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      # Assemble _site with all split data files at correct paths
      - name: Assemble _site
        run: |
          set -euo pipefail

          mkdir -p _site/portfolio _site/admin

          # Portfolio HTML
          cp portfolio/index.html _site/index.html
          cp portfolio/index.html _site/404.html

          # All 5 split data files
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json; do
            cp "$f" "_site/$f"
            echo "Copied $f → _site/$f ($(stat -c%s "_site/$f") bytes)"
          done

          # Admin panel
          cp -r admin/dist/. _site/admin/

          # _headers (Netlify/CF Pages cache rules)
          [ -f _headers ] && cp _headers _site/_headers || true

          # Integrity cross-check: verify each copied file matches source
          for f in portfolio/data_main.json portfolio/data_creds_1.json portfolio/data_creds_2.json portfolio/data_creds_3.json portfolio/data_creds_4.json; do
            SRC_HASH=$(sha256sum "$f" | awk '{print $1}')
            DST_HASH=$(sha256sum "_site/$f" | awk '{print $1}')
            if [ "$SRC_HASH" != "$DST_HASH" ]; then
              echo "❌ FATAL: hash mismatch for $f after copy!"
              exit 1
            fi
            echo "✅ Hash verified: $f"
          done

      - name: Print _site manifest
        run: |
          echo "### 📦 _site contents" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          find _site -type f | sort >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          find _site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Job 3: deploy to GitHub Pages ──────────────────────────────────────────
  deploy:
    name: "③ Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
